spring:
    cache:
        type: redis
    thymeleaf:
        cache: false
    mvc:
        async:
            request-timeout: 20000
    servlet:
        multipart:
            max-file-size: 10MB
            max-request-size: 100MB
    data:
      redis:
          host: ${REDIS_HOST:redis}
          port: ${REDIS_PORT:6379}
          database: 1
          password:
          timeout: 10000
    datasource:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://${DATABASE_HOST:mysql}:${DATABASE_PORT:3306}/wvp?useUnicode=true&characterEncoding=UTF8&rewriteBatchedStatements=true&serverTimezone=PRC&useSSL=false&allowMultiQueries=true&allowPublicKeyRetrieval=true
        username: ${DATABASE_USER:edge}
        password: ${DATABASE_PASSWORD:edge123456}

server:
    port: 18978
    ssl:
        enabled: false

sip:
    ip: 0.0.0.0
    show-ip: ${SIP_ShowIP:127.0.0.1}
    port: ${SIP_Port:8116}
    domain: ${SIP_Domain:3402000000}
    id: ${SIP_Id:34020000002000000001}
    password: ${SIP_Password:12345678}
    register-time-interval: 60
    ptz-speed: 50
    alarm: true
    timeout: 1000

media:
  id: edge-zlm
  ip: ${ZLM_HOST:zlm}
  http-port: 80
  stream-ip: ${Stream_IP:127.0.0.1}
  sdp-ip: ${SDP_IP:127.0.0.1}
  hook-ip: ${ZLM_HOOK_HOST:edge-wvp}
  http-ssl-port: 0
  flv-port: ${MediaHttp:28082}
  flv-ssl-port: ${MediaHttps:28443}
  ws-flv-port: ${MediaHttp:28082}
  ws-flv-ssl-port: ${MediaHttps:28443}
  rtp-proxy-port: ${MediaRtp:10003}
  rtmp-port: ${MediaRtmp:19350}
  rtmp-ssl-port: 0
  rtsp-port: ${MediaRtsp:15540}
  rtsp-ssl-port: 0
  auto-config: true
  secret: ${ZLM_SERCERT:su6TiedN2rVAmBbIDX0aa0QTiBJLBdcf}
  rtp:
    enable: false
    port-range: 30000,30500
    send-port-range: 50502,50506
  record-path: /opt/media/bin/www/record/
  record-day: 7
  record-assist-port: 0

user-settings:
    auto-apply-play: true
    play-timeout: 30000
    wait-track: false
    record-push-live: ${RecordPushLive:false}
    record-sip: ${RecordSip:false}
    stream-on-demand: true
    interface-authentication: true
    broadcast-for-platform: TCP-PASSIVE
    push-stream-after-ack: true
    send-to-platforms-when-id-lost: true
    push-authority: true

logging:
  config: classpath:logback-spring.xml
