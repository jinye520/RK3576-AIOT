[api]
apiDebug=1
secret=RK3576_ZLM_SECRET
snapRoot=./www/snap/
defaultSnap=./www/logo.png

[http]
port=80
sslport=443
charSet=utf-8
keepAliveSecond=15
maxReqSize=40960
rootPath=./www
sendBufSize=65536
recvBufSize=65536
forbidCacheSuffix=
forwarded_ip_header=
allow_cross_domains=1
virtualPath=0

[hook]
enable=0
on_flow_report=
on_http_access=
on_play=
on_publish=
on_record_mp4=
on_record_ts=
on_rtsp_auth=
on_rtsp_realm=
on_shell_login=
on_stream_changed=
on_stream_none_reader=
on_stream_not_found=
on_server_started=
admin_params=
timeoutSec=10

[general]
flowThreshold=1024
streamNoneReaderDelayMS=15000
maxStreamWaitMS=15000
enableVhost=0
addMuteAudio=1
publishToHls=1
publishToMP4=0
resetWhenRePlay=1
mergeWriteMS=0
wait_add_track_ms=3000
unready_frame_cache=100

[rtsp]
port=554
authBasic=0
directProxy=1n
handshakeSecond=15
keepAliveSecond=15
lowLatency=0
rtpTransportType=-1

[rtmp]
port=1935
handshakeSecond=15
keepAliveSecond=15

[rtc]
port=10000
timeoutSec=15
externIP=
