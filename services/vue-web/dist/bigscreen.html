<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>控制盒本地监控大屏</title>
    <style>
      :root {
        --text: #f6fdff;
        --muted: rgba(224, 241, 246, 0.78);
        --line: rgba(153, 229, 255, 0.16);
        --line-strong: rgba(153, 229, 255, 0.42);
        --primary: #7be8e1;
        --accent: #94ebff;
        --green: #4fd6a6;
        --amber: #f6c86b;
        --red: #ff7a7a;
        --panel: rgba(14, 47, 69, 0.34);
        --panel-soft: rgba(255, 255, 255, 0.06);
        --shadow: 0 24px 70px rgba(7, 25, 38, 0.2);
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 18% 16%, rgba(148, 235, 255, 0.18), transparent 22%),
          radial-gradient(circle at 82% 18%, rgba(123, 232, 225, 0.14), transparent 20%),
          linear-gradient(180deg, #0d3a57 0%, #114563 38%, #14506f 100%);
        overflow: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(transparent 0 96%, rgba(148, 235, 255, 0.04) 96% 100%),
          linear-gradient(90deg, transparent 0 96%, rgba(148, 235, 255, 0.025) 96% 100%);
        background-size: 100% 40px, 40px 100%;
        opacity: 0.42;
      }

      .screen {
        height: 100vh;
        padding: 18px;
        display: grid;
        grid-template-rows: 118px 1fr;
        gap: 16px;
      }

      .header,
      .metric,
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      .header {
        border-radius: 30px;
        display: grid;
        grid-template-columns: 320px 1fr 220px;
        align-items: center;
        padding: 0 26px;
      }

      .brand-tag {
        display: inline-flex;
        align-items: center;
        width: fit-content;
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid rgba(153, 229, 255, 0.18);
        background: rgba(255,255,255,0.05);
        color: #d9f7ff;
        font-size: 11px;
        letter-spacing: 0.08em;
      }

      .brand-title {
        margin-top: 10px;
        font-size: 26px;
        font-weight: 800;
      }

      .header-center {
        text-align: center;
        display: grid;
        justify-items: center;
        gap: 6px;
      }

      .center-title {
        font-size: 32px;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-shadow: 0 6px 20px rgba(7, 25, 38, 0.24);
      }

      .center-time {
        color: rgba(246, 253, 255, 0.88);
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.06em;
      }

      .header-side {
        display: grid;
        justify-items: end;
        gap: 8px;
      }

      .header-left {
        display: grid;
        align-content: center;
        gap: 10px;
      }

      .clock {
        font-size: 30px;
        font-weight: 800;
        color: var(--accent);
      }

      .subline {
        color: var(--muted);
        font-size: 13px;
      }

      .header-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: end;
      }

      .nav-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 92px;
        padding: 9px 14px;
        border-radius: 999px;
        border: 1px solid rgba(153, 229, 255, 0.16);
        background: rgba(255,255,255,0.06);
        color: var(--text);
        text-decoration: none;
        font-size: 12px;
        cursor: pointer;
      }

      .nav-chip.primary {
        background: linear-gradient(135deg, var(--primary), var(--accent));
        color: #062336;
        border-color: transparent;
      }

      .header-left .header-actions {
        justify-content: start;
      }

      .hidden { display: none !important; }

      .device-status-card {
        border-radius: 24px;
        padding: 16px;
        border: 1px solid rgba(153, 229, 255, 0.12);
        background: var(--panel-soft);
      }

      .device-status-head {
        margin-bottom: 14px;
      }

      .device-status-title {
        font-size: 16px;
        font-weight: 700;
      }

      .device-status-subtitle {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      .device-status-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .device-status-item {
        border-radius: 16px;
        border: 1px solid rgba(153, 229, 255, 0.1);
        background: rgba(255,255,255,0.05);
        padding: 12px;
      }

      .device-status-label {
        color: var(--muted);
        font-size: 11px;
      }

      .device-status-value {
        margin-top: 8px;
        font-size: 24px;
        font-weight: 800;
      }

      .device-status-foot {
        margin-top: 4px;
        color: var(--muted);
        font-size: 11px;
      }

      .main {
        display: grid;
        grid-template-columns: 1.02fr 1.48fr 1.02fr;
        gap: 16px;
        min-height: 0;
      }

      .stack {
        display: grid;
        gap: 16px;
        min-height: 0;
      }

      .panel {
        border-radius: 24px;
        padding: 16px;
        min-height: 0;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden;
      }

      .panel::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(180deg, rgba(255,255,255,0.06), transparent 28%);
        opacity: 0.55;
      }

      .panel > * {
        position: relative;
        z-index: 1;
      }

      .panel-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }

      .panel-title {
        font-size: 18px;
        font-weight: 700;
      }

      .panel-subtitle {
        color: var(--muted);
        font-size: 12px;
      }

      .status-grid,
      .telemetry-feed {
        display: grid;
        gap: 10px;
      }

      .status-item,
      .telemetry-row,
      .summary-card {
        border-radius: 18px;
        border: 1px solid rgba(153, 229, 255, 0.12);
        background: var(--panel-soft);
      }

      .status-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 13px 14px;
      }

      .status-name,
      .telemetry-time,
      .telemetry-topic,
      .summary-label {
        color: var(--muted);
      }

      .status-text { font-weight: 700; }
      .ok { color: var(--green); }
      .warn { color: var(--amber); }
      .bad { color: var(--red); }

      .sensor-summary-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 12px;
      }

      .sensor-summary-card {
        border-radius: 18px;
        border: 1px solid rgba(153, 229, 255, 0.12);
        background: rgba(255,255,255,0.06);
        padding: 12px;
      }

      .sensor-summary-label {
        color: var(--muted);
        font-size: 12px;
      }

      .sensor-summary-value {
        margin-top: 8px;
        font-size: 26px;
        font-weight: 800;
      }

      .sensor-summary-foot {
        margin-top: 4px;
        color: var(--muted);
        font-size: 11px;
      }

      .trend-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }

      .trend-tab {
        border: 1px solid rgba(153, 229, 255, 0.14);
        background: rgba(255,255,255,0.06);
        color: var(--text);
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 12px;
        cursor: pointer;
      }

      .trend-tab.active {
        background: linear-gradient(135deg, var(--primary), var(--accent));
        color: #062336;
        border-color: transparent;
      }

      .mini-trend-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 12px;
      }

      .mini-trend-card {
        border-radius: 18px;
        border: 1px solid rgba(153, 229, 255, 0.12);
        background: rgba(255,255,255,0.05);
        padding: 10px;
      }

      .mini-trend-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }

      .mini-trend-title {
        font-size: 13px;
        font-weight: 700;
      }

      .mini-trend-value {
        color: var(--muted);
        font-size: 12px;
      }

      .mini-canvas-wrap {
        height: 120px;
      }

      .chart-wrap {
        flex: 1;
        min-height: 0;
        border-radius: 22px;
        border: 1px solid rgba(153, 229, 255, 0.12);
        background: rgba(255,255,255,0.05);
        padding: 12px;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .video-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        flex: 1;
        min-height: 0;
      }

      .video-card {
        position: relative;
        min-height: 220px;
        border-radius: 22px;
        overflow: hidden;
        border: 1px solid rgba(153, 229, 255, 0.12);
        background: linear-gradient(180deg, rgba(8, 16, 23, 0.9), rgba(3, 7, 11, 0.98));
        text-decoration: none;
        color: var(--text);
      }

      .video-card::before {
        content: "LOCAL VIDEO";
        position: absolute;
        top: 14px;
        left: 16px;
        font-size: 11px;
        letter-spacing: 0.18em;
        color: rgba(235, 251, 255, 0.44);
      }

      .video-card::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(14, 24, 32, 0.04), rgba(2, 5, 8, 0.2));
      }

      .video-meta {
        position: absolute;
        left: 16px;
        right: 16px;
        bottom: 14px;
        z-index: 1;
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 12px;
      }

      .video-empty {
        position: absolute;
        inset: 0;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(235, 251, 255, 0.34);
        font-size: 14px;
        letter-spacing: 0.12em;
      }

      .video-name {
        font-size: 16px;
        font-weight: 700;
      }

      .video-desc,
      .video-tag {
        color: var(--muted);
        font-size: 12px;
      }

      .telemetry-feed {
        overflow: auto;
        padding-right: 4px;
        display: grid;
        gap: 10px;
      }

      .telemetry-row {
        padding: 12px 14px;
      }

      .telemetry-top {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
      }

      .telemetry-title {
        font-size: 14px;
        font-weight: 700;
      }

      .kv-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .kv-pill {
        min-width: 110px;
        padding: 8px 10px;
        border-radius: 14px;
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(153, 229, 255, 0.12);
      }

      .kv-k {
        color: var(--muted);
        font-size: 11px;
        margin-bottom: 4px;
      }

      .kv-v {
        font-size: 15px;
        font-weight: 700;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .summary-card {
        min-height: 96px;
      }

      .summary-card {
        padding: 14px;
      }

      .summary-value {
        margin-top: 8px;
        font-size: 26px;
        font-weight: 800;
      }

      .access-note {
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.8;
      }

      @media (max-width: 1480px) {
        .screen {
          height: auto;
          overflow: auto;
        }
        .header,
        .main { grid-template-columns: 1fr; }
        .header-side,
        .header-center { justify-items: start; text-align: left; }
        .video-grid,
        .summary-grid { grid-template-columns: 1fr; }
        .video-card { min-height: 200px; }
      }
    </style>
  </head>
  <body>
    <div class="screen">
      <header class="header">
        <div class="header-left">
          <div class="header-actions">
            <button class="nav-chip primary hidden" id="adminEntryBtn">后台管理</button>
            <button class="nav-chip" id="logoutBtn">退出登录</button>
          </div>
        </div>
        <div class="header-center">
          <div class="center-title">智能海洋物联网控制盒监控中心</div>
          <div class="center-time" id="centerTimeText">--</div>
        </div>
        <div class="header-side">
          <div class="clock" id="clockText">--:--:--</div>
          <div class="subline" id="dateText">--</div>
          <div class="subline" id="userInfoText">当前未登录</div>
        </div>
      </header>

      <section class="main">
        <div class="stack">
          <section class="panel" style="flex:1; min-height: 300px;">
            <div class="panel-head">
              <div>
                <div class="panel-title">本地遥测趋势</div>
                <div class="panel-subtitle">海洋监测数据与多指标趋势</div>
              </div>
            </div>
            <div class="sensor-summary-grid" id="sensorSummaryGrid"></div>
            <div class="mini-trend-grid" id="miniTrendGrid"></div>
            <div class="trend-tabs" id="trendTabs"></div>
            <div class="chart-wrap">
              <canvas id="sensorChart"></canvas>
            </div>
          </section>
        </div>

        <section class="panel">
          <div class="panel-head">
            <div>
              <div class="panel-title">本地视频</div>
              <div class="panel-subtitle">控制盒接入点位与视频入口</div>
            </div>
          </div>
          <div class="video-grid" id="videoGrid"></div>
        </section>

        <div class="stack">
          <section class="panel" style="flex:1;">
            <div class="panel-head">
              <div>
                <div class="panel-title">最新采集流</div>
                <div class="panel-subtitle">显示最近上报的感知数据</div>
              </div>
            </div>
            <div class="telemetry-feed" id="telemetryFeed"></div>
          </section>

          <section class="panel">
            <div class="device-status-card">
              <div class="device-status-head">
                <div class="device-status-title">设备状态</div>
                <div class="device-status-subtitle">本地设备、视频与遥测运行摘要</div>
              </div>
              <div class="device-status-grid" id="deviceStatusGrid"></div>
            </div>
          </section>
        </div>
      </section>
    </div>

    <script>
      const dashboardUrl = '/api/video/bigscreen/';
      const chartCanvas = document.getElementById('sensorChart');
      const chartCtx = chartCanvas.getContext('2d');
      const miniTrendMetrics = ['temperature', 'depth', 'ph', 'dissolved_oxygen'];
      const trendMetricConfig = {
        temperature: { label: '水温', unit: '°C' },
        depth: { label: '水深', unit: 'm' },
        ph: { label: 'PH值', unit: '' },
        dissolved_oxygen: { label: '溶解氧', unit: 'mg/L' },
        salinity: { label: '盐度', unit: '‰' },
        turbidity: { label: '浊度', unit: 'NTU' },
      };
      let latestSeries = [];
      let activeTrendMetric = 'temperature';

      function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return '';
      }

      async function ensureSessionCookie() {
        await fetch('/api/platform/session/', { cache: 'no-store', credentials: 'same-origin' });
      }

      function syncClock() {
        const now = new Date();
        const timeText = now.toLocaleTimeString('zh-CN', { hour12: false });
        const dateText = now.toLocaleDateString('zh-CN', { weekday: 'long', year: 'numeric', month: '2-digit', day: '2-digit' });
        document.getElementById('clockText').textContent = timeText;
        document.getElementById('dateText').textContent = dateText;
        document.getElementById('centerTimeText').textContent = `${dateText} ${timeText}`;
      }

      function resizeCanvas() {
        const rect = chartCanvas.getBoundingClientRect();
        chartCanvas.width = rect.width * window.devicePixelRatio;
        chartCanvas.height = rect.height * window.devicePixelRatio;
        chartCtx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
        drawSensorChart(latestSeries);
      }

      function drawSensorChart(items) {
        const rect = chartCanvas.getBoundingClientRect();
        const width = rect.width;
        const height = rect.height;
        chartCtx.clearRect(0, 0, width, height);

        chartCtx.strokeStyle = 'rgba(148,235,255,0.14)';
        chartCtx.lineWidth = 1;
        for (let i = 0; i < 5; i++) {
          const y = 24 + (height - 48) * (i / 4);
          chartCtx.beginPath();
          chartCtx.moveTo(0, y);
          chartCtx.lineTo(width, y);
          chartCtx.stroke();
        }

        if (!items || items.length === 0) {
          chartCtx.fillStyle = 'rgba(224,241,246,0.82)';
          chartCtx.font = '14px sans-serif';
          chartCtx.fillText('暂无本地遥测曲线', 24, height / 2);
          return;
        }

        const values = items.map(item => getMetricValue(item.payload || {}, activeTrendMetric));
        const min = Math.min(...values, 0);
        const max = Math.max(...values, 1);
        const range = Math.max(max - min, 1);
        const left = 26;
        const right = width - 16;
        const top = 18;
        const bottom = height - 30;
        const stepX = values.length > 1 ? (right - left) / (values.length - 1) : 0;

        const points = values.map((value, index) => {
          const x = left + stepX * index;
          const y = bottom - ((value - min) / range) * (bottom - top);
          return { x, y, value };
        });

        const gradient = chartCtx.createLinearGradient(0, top, 0, bottom);
        gradient.addColorStop(0, 'rgba(148,235,255,0.35)');
        gradient.addColorStop(1, 'rgba(148,235,255,0.04)');

        chartCtx.beginPath();
        chartCtx.moveTo(points[0].x, bottom);
        points.forEach((point) => chartCtx.lineTo(point.x, point.y));
        chartCtx.lineTo(points[points.length - 1].x, bottom);
        chartCtx.closePath();
        chartCtx.fillStyle = gradient;
        chartCtx.fill();

        chartCtx.beginPath();
        points.forEach((point, index) => {
          if (index === 0) chartCtx.moveTo(point.x, point.y);
          else chartCtx.lineTo(point.x, point.y);
        });
        chartCtx.strokeStyle = '#94ebff';
        chartCtx.lineWidth = 3;
        chartCtx.stroke();

        points.forEach((point) => {
          chartCtx.beginPath();
          chartCtx.arc(point.x, point.y, 4, 0, Math.PI * 2);
          chartCtx.fillStyle = '#7be8e1';
          chartCtx.fill();
        });
      }

      function getMetricValue(payload, metric) {
        const direct = payload[metric];
        if (typeof direct === 'number') return direct;
        const aliases = {
          temperature: ['temp', 'water_temp', 'temperature'],
          depth: ['depth', 'water_depth'],
          ph: ['ph', 'ph_value'],
          dissolved_oxygen: ['do', 'dissolved_oxygen'],
          salinity: ['salinity'],
          turbidity: ['turbidity'],
        };
        for (const key of aliases[metric] || []) {
          if (typeof payload[key] === 'number') return payload[key];
        }
        return 0;
      }

      function formatMetric(metric, value) {
        const config = trendMetricConfig[metric] || { unit: '' };
        return `${Number(value).toFixed(metric === 'ph' ? 2 : 1)}${config.unit}`;
      }

      function renderSensorSummary(items) {
        const container = document.getElementById('sensorSummaryGrid');
        const metrics = ['temperature', 'depth', 'ph', 'dissolved_oxygen'];
        const latest = items && items.length ? items[items.length - 1].payload || {} : {};
        container.innerHTML = metrics.map((metric) => {
          const config = trendMetricConfig[metric];
          const value = formatMetric(metric, getMetricValue(latest, metric));
          return `
            <div class="sensor-summary-card">
              <div class="sensor-summary-label">${config.label}</div>
              <div class="sensor-summary-value">${value}</div>
              <div class="sensor-summary-foot">本地实时监测</div>
            </div>
          `;
        }).join('');
      }

      function renderTrendTabs() {
        const container = document.getElementById('trendTabs');
        container.innerHTML = Object.entries(trendMetricConfig).map(([metric, config]) => `
          <button class="trend-tab ${metric === activeTrendMetric ? 'active' : ''}" data-metric="${metric}">${config.label}</button>
        `).join('');
        container.querySelectorAll('.trend-tab').forEach((button) => {
          button.addEventListener('click', () => {
            activeTrendMetric = button.dataset.metric;
            renderTrendTabs();
            drawSensorChart(latestSeries);
          });
        });
      }

      function drawMiniChart(canvas, values) {
        const ctx = canvas.getContext('2d');
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * window.devicePixelRatio;
        canvas.height = rect.height * window.devicePixelRatio;
        ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
        ctx.clearRect(0, 0, rect.width, rect.height);
        if (!values.length) return;
        const min = Math.min(...values, 0);
        const max = Math.max(...values, 1);
        const range = Math.max(max - min, 1);
        const left = 8;
        const right = rect.width - 8;
        const top = 8;
        const bottom = rect.height - 10;
        const stepX = values.length > 1 ? (right - left) / (values.length - 1) : 0;
        ctx.beginPath();
        values.forEach((value, index) => {
          const x = left + stepX * index;
          const y = bottom - ((value - min) / range) * (bottom - top);
          if (index === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.strokeStyle = '#94ebff';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      function renderMiniTrends(items) {
        const container = document.getElementById('miniTrendGrid');
        container.innerHTML = miniTrendMetrics.map((metric) => {
          const config = trendMetricConfig[metric];
          const latest = items.length ? formatMetric(metric, getMetricValue(items[items.length - 1].payload || {}, metric)) : '--';
          return `
            <div class="mini-trend-card">
              <div class="mini-trend-head">
                <div class="mini-trend-title">${config.label}</div>
                <div class="mini-trend-value">${latest}</div>
              </div>
              <div class="mini-canvas-wrap"><canvas data-mini-metric="${metric}"></canvas></div>
            </div>
          `;
        }).join('');

        container.querySelectorAll('canvas[data-mini-metric]').forEach((canvas) => {
          const metric = canvas.dataset.miniMetric;
          const values = items.map(item => getMetricValue(item.payload || {}, metric));
          drawMiniChart(canvas, values);
        });
      }

      function updateAccessNote(session) {
        const userInfoText = document.getElementById('userInfoText');
        const adminEntryBtn = document.getElementById('adminEntryBtn');
        if (!session || !session.authenticated || !session.user) {
          userInfoText.textContent = '当前未登录';
          adminEntryBtn.classList.add('hidden');
          return;
        }
        userInfoText.textContent = `当前用户：${session.user.display_name}（${session.user.role}）`;
        if (session.user.role === 'admin') {
          adminEntryBtn.classList.remove('hidden');
        } else {
          adminEntryBtn.classList.add('hidden');
        }
      }

      async function loadSession() {
        try {
          const res = await fetch('/api/platform/session/', { cache: 'no-store', credentials: 'same-origin' });
          if (!res.ok) throw new Error('session failed');
          const data = await res.json();
          updateAccessNote(data);
        } catch (err) {
          updateAccessNote(null);
        }
      }

      function renderTelemetryFeed(items) {
        const container = document.getElementById('telemetryFeed');
        if (!items || items.length === 0) {
          container.innerHTML = '<div class="summary-card" style="padding:14px;">暂无本地采集数据</div>';
          return;
        }
        const metricOrder = ['temperature', 'depth', 'ph', 'dissolved_oxygen', 'salinity', 'turbidity'];
        container.innerHTML = items.map(item => {
          const payload = item.payload || {};
          const kv = metricOrder.map((metric) => {
            const config = trendMetricConfig[metric];
            return `
              <div class="kv-pill">
                <div class="kv-k">${config.label}</div>
                <div class="kv-v">${formatMetric(metric, getMetricValue(payload, metric))}</div>
              </div>
            `;
          }).join('');
          return `
            <div class="telemetry-row">
              <div class="telemetry-top">
                <div class="telemetry-title">设备 #${item.device} · 网关 #${item.gateway}</div>
                <div class="telemetry-time">${new Date(item.collected_at).toLocaleTimeString('zh-CN', { hour12: false })}</div>
              </div>
              <div class="telemetry-topic">${item.topic || '--'}</div>
              <div class="kv-list">${kv}</div>
            </div>
          `;
        }).join('');
      }

      function renderVideoGrid(slots) {
        const container = document.getElementById('videoGrid');
        if (!slots || slots.length === 0) {
          container.innerHTML = '<div class="summary-card" style="padding:14px;">暂无本地视频点位</div>';
          return;
        }
        container.innerHTML = slots.map(slot => {
          const online = slot.status && slot.status !== 'standby';
          return `
            <a class="video-card" style="border-color:${online ? 'rgba(123, 232, 225, 0.55)' : 'rgba(153, 229, 255, 0.12)'};" href="${slot.player_url || '#'}" target="_blank" rel="noreferrer">
              <div class="video-empty">${online ? '视频在线' : '视频未接入'}</div>
              <div class="video-meta">
                <div>
                  <div class="video-name">${slot.name}</div>
                  <div class="video-desc">${slot.channel} · ${slot.status}</div>
                </div>
                <div class="video-tag">${slot.tag || '--'}</div>
              </div>
            </a>
          `;
        }).join('');
      }

      function renderDeviceStatus(stats, inventory) {
        const items = [
          ['在线设备', stats.device_count ?? 0, '设备总量'],
          ['在线状态', stats.online_device_count ?? 0, '实时在线'],
          ['视频点位', inventory.device_total ?? 0, '本地视频'],
          ['媒体节点', `${inventory.media_server_online ?? 0}/${inventory.media_server_total ?? 0}`, '视频链路'],
          ['遥测累计', stats.telemetry_count ?? 0, '边缘接入'],
          ['视频链路', inventory.login_ready ? 'READY' : 'WAIT', 'WVP / ZLM'],
        ];
        document.getElementById('deviceStatusGrid').innerHTML = items.map(([label, value, foot]) => `
          <div class="device-status-item">
            <div class="device-status-label">${label}</div>
            <div class="device-status-value">${value}</div>
            <div class="device-status-foot">${foot}</div>
          </div>
        `).join('');
      }

      async function refreshBigscreen() {
        try {
          const res = await fetch(dashboardUrl, { cache: 'no-store' });
          if (!res.ok) throw new Error('dashboard failed');
          const data = await res.json();
          const stats = data.stats || {};
          const inventory = data.video_inventory || {};
          latestSeries = data.latest_telemetry || [];

          renderSensorSummary(latestSeries);
          renderMiniTrends(latestSeries);
          renderTrendTabs();
          renderTelemetryFeed(latestSeries);
          renderVideoGrid(data.video_slots || []);
          renderDeviceStatus(stats, inventory);
          drawSensorChart(latestSeries);
        } catch (err) {
          document.getElementById('sensorSummaryGrid').innerHTML = '<div class="summary-card" style="padding:14px; grid-column: 1 / -1;">海洋监测摘要加载失败</div>';
          document.getElementById('miniTrendGrid').innerHTML = '<div class="summary-card" style="padding:14px; grid-column: 1 / -1;">趋势小图加载失败</div>';
          document.getElementById('telemetryFeed').innerHTML = '<div class="summary-card" style="padding:14px;">本地采集流加载失败</div>';
          document.getElementById('videoGrid').innerHTML = '<div class="summary-card" style="padding:14px;">本地视频加载失败</div>';
          document.getElementById('deviceStatusGrid').innerHTML = '<div class="summary-card" style="padding:14px; grid-column: 1 / -1;">设备状态加载失败</div>';
          drawSensorChart([]);
        }
      }

      async function logout() {
        await ensureSessionCookie();
        await fetch('/api/platform/logout/', {
          method: 'POST',
          headers: { 'X-CSRFToken': getCookie('csrftoken') },
          credentials: 'same-origin',
        });
        window.location.href = '/login.html';
      }

      document.getElementById('adminEntryBtn').addEventListener('click', () => {
        window.location.href = '/admin.html';
      });
      document.getElementById('logoutBtn').addEventListener('click', logout);

      syncClock();
      setInterval(syncClock, 1000);
      window.addEventListener('resize', () => {
        resizeCanvas();
        renderMiniTrends(latestSeries);
      });
      setTimeout(resizeCanvas, 80);
      loadSession();
      refreshBigscreen();
      setInterval(refreshBigscreen, 5000);
    </script>
  </body>
</html>
