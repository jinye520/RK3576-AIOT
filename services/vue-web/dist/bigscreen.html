<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>控制盒本地监控大屏</title>
    <style>
      :root {
        --text: #f6fdff;
        --muted: rgba(224, 241, 246, 0.78);
        --line: rgba(153, 229, 255, 0.16);
        --line-strong: rgba(153, 229, 255, 0.42);
        --primary: #7be8e1;
        --accent: #94ebff;
        --green: #4fd6a6;
        --amber: #f6c86b;
        --red: #ff7a7a;
        --panel: rgba(14, 47, 69, 0.34);
        --panel-soft: rgba(255, 255, 255, 0.06);
        --shadow: 0 24px 70px rgba(7, 25, 38, 0.2);
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 18%, rgba(148, 235, 255, 0.16), transparent 24%),
          radial-gradient(circle at 82% 20%, rgba(123, 232, 225, 0.12), transparent 20%),
          linear-gradient(180deg, #0d3046 0%, #12384f 46%, #163e57 100%);
        overflow: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(transparent 0 96%, rgba(148, 235, 255, 0.04) 96% 100%),
          linear-gradient(90deg, transparent 0 96%, rgba(148, 235, 255, 0.025) 96% 100%);
        background-size: 100% 40px, 40px 100%;
        opacity: 0.42;
      }

      .screen {
        height: 100vh;
        padding: 18px;
        display: grid;
        grid-template-rows: 118px 120px 1fr;
        gap: 16px;
      }

      .header,
      .metric,
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      .header {
        border-radius: 28px;
        display: grid;
        grid-template-columns: 280px 1fr 320px;
        align-items: center;
        padding: 0 24px;
      }

      .brand-tag {
        display: inline-flex;
        align-items: center;
        width: fit-content;
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid rgba(153, 229, 255, 0.18);
        background: rgba(255,255,255,0.05);
        color: #d9f7ff;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .brand-title {
        margin-top: 10px;
        font-size: 26px;
        font-weight: 800;
      }

      .header-center {
        text-align: center;
      }

      .header-center h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.1;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .header-center p {
        margin: 12px 0 0;
        color: var(--text);
        font-size: 38px;
        line-height: 1.08;
        font-weight: 800;
        letter-spacing: 0.06em;
      }

      .header-side {
        display: grid;
        justify-items: end;
        gap: 8px;
      }

      .clock {
        font-size: 30px;
        font-weight: 800;
        color: var(--accent);
      }

      .subline {
        color: var(--muted);
        font-size: 13px;
      }

      .header-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: end;
      }

      .nav-chip {
        display: inline-flex;
        align-items: center;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(153, 229, 255, 0.16);
        background: rgba(255,255,255,0.06);
        color: var(--text);
        text-decoration: none;
        font-size: 12px;
        cursor: pointer;
      }

      .hidden { display: none !important; }

      .metric-row {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 14px;
      }

      .metric {
        border-radius: 24px;
        padding: 18px;
        overflow: hidden;
      }

      .metric-label {
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .metric-value {
        margin-top: 12px;
        font-size: 32px;
        font-weight: 800;
      }

      .metric-foot {
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.7;
      }

      .main {
        display: grid;
        grid-template-columns: 1.02fr 1.48fr 1.02fr;
        gap: 16px;
        min-height: 0;
      }

      .stack {
        display: grid;
        gap: 16px;
        min-height: 0;
      }

      .panel {
        border-radius: 28px;
        padding: 18px;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .panel-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }

      .panel-title {
        font-size: 18px;
        font-weight: 700;
      }

      .panel-subtitle {
        color: var(--muted);
        font-size: 12px;
      }

      .status-grid,
      .telemetry-feed {
        display: grid;
        gap: 10px;
      }

      .status-item,
      .telemetry-row,
      .summary-card {
        border-radius: 18px;
        border: 1px solid rgba(153, 229, 255, 0.12);
        background: var(--panel-soft);
      }

      .status-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 13px 14px;
      }

      .status-name,
      .telemetry-time,
      .telemetry-topic,
      .summary-label {
        color: var(--muted);
      }

      .status-text { font-weight: 700; }
      .ok { color: var(--green); }
      .warn { color: var(--amber); }
      .bad { color: var(--red); }

      .chart-wrap {
        flex: 1;
        min-height: 0;
        border-radius: 22px;
        border: 1px solid rgba(153, 229, 255, 0.12);
        background: rgba(255,255,255,0.05);
        padding: 12px;
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .video-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        flex: 1;
        min-height: 0;
      }

      .video-card {
        position: relative;
        min-height: 210px;
        border-radius: 22px;
        overflow: hidden;
        border: 1px solid rgba(153, 229, 255, 0.12);
        background: linear-gradient(180deg, rgba(8, 16, 23, 0.9), rgba(3, 7, 11, 0.98));
        text-decoration: none;
        color: var(--text);
      }

      .video-card::before {
        content: "LOCAL VIDEO";
        position: absolute;
        top: 14px;
        left: 16px;
        font-size: 11px;
        letter-spacing: 0.18em;
        color: rgba(235, 251, 255, 0.54);
      }

      .video-card::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(14, 24, 32, 0.04), rgba(2, 5, 8, 0.2));
      }

      .video-meta {
        position: absolute;
        left: 16px;
        right: 16px;
        bottom: 14px;
        z-index: 1;
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 12px;
      }

      .video-empty {
        position: absolute;
        inset: 0;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(235, 251, 255, 0.38);
        font-size: 14px;
        letter-spacing: 0.12em;
      }

      .video-name {
        font-size: 16px;
        font-weight: 700;
      }

      .video-desc,
      .video-tag {
        color: var(--muted);
        font-size: 12px;
      }

      .telemetry-feed {
        overflow: auto;
        padding-right: 4px;
      }

      .telemetry-row {
        padding: 12px 14px;
      }

      .telemetry-top {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
      }

      .telemetry-title {
        font-size: 14px;
        font-weight: 700;
      }

      .kv-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .kv-pill {
        min-width: 110px;
        padding: 8px 10px;
        border-radius: 14px;
        background: rgba(255,255,255,0.07);
        border: 1px solid rgba(153, 229, 255, 0.12);
      }

      .kv-k {
        color: var(--muted);
        font-size: 11px;
        margin-bottom: 4px;
      }

      .kv-v {
        font-size: 15px;
        font-weight: 700;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .summary-card {
        padding: 14px;
      }

      .summary-value {
        margin-top: 8px;
        font-size: 26px;
        font-weight: 800;
      }

      .access-note {
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.8;
      }

      @media (max-width: 1480px) {
        .screen {
          height: auto;
          overflow: auto;
        }
        .header,
        .main,
        .metric-row { grid-template-columns: 1fr; }
        .header-side,
        .header-center { justify-items: start; text-align: left; }
        .video-grid,
        .summary-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="screen">
      <header class="header">
        <div>
          <div class="brand-tag">Smart Marine Control Box</div>
          <div class="brand-title">控制盒本地监控大屏</div>
        </div>
        <div class="header-center">
          <h1>LOCAL MONITORING SCREEN</h1>
          <p>海洋物联网在线监控大屏</p>
        </div>
        <div class="header-side">
          <div class="clock" id="clockText">--:--:--</div>
          <div class="subline" id="dateText">--</div>
          <div class="subline" id="userInfoText">当前未登录</div>
          <div class="header-actions">
            <a class="nav-chip" href="/login.html">切换登录</a>
            <button class="nav-chip hidden" id="adminEntryBtn">后台管理</button>
            <button class="nav-chip" id="logoutBtn">退出登录</button>
          </div>
        </div>
      </header>

      <section class="metric-row">
        <div class="metric">
          <div class="metric-label">在线设备</div>
          <div class="metric-value" id="metricDevices">--</div>
          <div class="metric-foot">本地控制盒当前识别设备数</div>
        </div>
        <div class="metric">
          <div class="metric-label">在线状态</div>
          <div class="metric-value" id="metricOnlineDevices">--</div>
          <div class="metric-foot">实时在线采集设备数量</div>
        </div>
        <div class="metric">
          <div class="metric-label">视频点位</div>
          <div class="metric-value" id="metricVideoDevices">--</div>
          <div class="metric-foot">本地已接入视频点位</div>
        </div>
        <div class="metric">
          <div class="metric-label">媒体节点</div>
          <div class="metric-value" id="metricMediaNodes">--</div>
          <div class="metric-foot">视频链路在线节点数</div>
        </div>
        <div class="metric">
          <div class="metric-label">遥测累计</div>
          <div class="metric-value" id="metricTelemetry">--</div>
          <div class="metric-foot">本地边缘遥测接入总量</div>
        </div>
        <div class="metric">
          <div class="metric-label">视频链路</div>
          <div class="metric-value" id="metricWvpLogin">--</div>
          <div class="metric-foot">WVP / ZLM 运行状态</div>
        </div>
      </section>

      <section class="main">
        <div class="stack">
          <section class="panel" style="flex:1; min-height: 300px;">
            <div class="panel-head">
              <div>
                <div class="panel-title">本地遥测趋势</div>
                <div class="panel-subtitle">最近 10 条采集数据趋势</div>
              </div>
            </div>
            <div class="chart-wrap">
              <canvas id="sensorChart"></canvas>
            </div>
          </section>
        </div>

        <section class="panel">
          <div class="panel-head">
            <div>
              <div class="panel-title">本地视频</div>
              <div class="panel-subtitle">控制盒接入点位与视频入口</div>
            </div>
          </div>
          <div class="video-grid" id="videoGrid"></div>
        </section>

        <div class="stack">
          <section class="panel" style="flex:1;">
            <div class="panel-head">
              <div>
                <div class="panel-title">最新采集流</div>
                <div class="panel-subtitle">显示最近上报的感知数据</div>
              </div>
            </div>
            <div class="telemetry-feed" id="telemetryFeed"></div>
          </section>

          <section class="panel">
            <div class="panel-head">
              <div>
                <div class="panel-title">视频资源摘要</div>
                <div class="panel-subtitle">本地视频能力与媒体资源</div>
              </div>
            </div>
            <div class="summary-grid" id="videoSummaryStrip"></div>
          </section>
        </div>
      </section>
    </div>

    <script>
      const dashboardUrl = '/api/video/bigscreen/';
      const chartCanvas = document.getElementById('sensorChart');
      const chartCtx = chartCanvas.getContext('2d');
      let latestSeries = [];

      function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return '';
      }

      async function ensureSessionCookie() {
        await fetch('/api/platform/session/', { cache: 'no-store', credentials: 'same-origin' });
      }

      function syncClock() {
        const now = new Date();
        document.getElementById('clockText').textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
        document.getElementById('dateText').textContent = now.toLocaleDateString('zh-CN', { weekday: 'long', year: 'numeric', month: '2-digit', day: '2-digit' });
      }

      function resizeCanvas() {
        const rect = chartCanvas.getBoundingClientRect();
        chartCanvas.width = rect.width * window.devicePixelRatio;
        chartCanvas.height = rect.height * window.devicePixelRatio;
        chartCtx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
        drawSensorChart(latestSeries);
      }

      function drawSensorChart(items) {
        const rect = chartCanvas.getBoundingClientRect();
        const width = rect.width;
        const height = rect.height;
        chartCtx.clearRect(0, 0, width, height);

        chartCtx.strokeStyle = 'rgba(148,235,255,0.14)';
        chartCtx.lineWidth = 1;
        for (let i = 0; i < 5; i++) {
          const y = 24 + (height - 48) * (i / 4);
          chartCtx.beginPath();
          chartCtx.moveTo(0, y);
          chartCtx.lineTo(width, y);
          chartCtx.stroke();
        }

        if (!items || items.length === 0) {
          chartCtx.fillStyle = 'rgba(224,241,246,0.82)';
          chartCtx.font = '14px sans-serif';
          chartCtx.fillText('暂无本地遥测曲线', 24, height / 2);
          return;
        }

        const values = items.map(item => {
          const payload = item.payload || {};
          if (typeof payload.value === 'number') return payload.value;
          const firstNumber = Object.values(payload).find(v => typeof v === 'number');
          return typeof firstNumber === 'number' ? firstNumber : 0;
        });
        const min = Math.min(...values, 0);
        const max = Math.max(...values, 1);
        const range = Math.max(max - min, 1);
        const left = 26;
        const right = width - 16;
        const top = 18;
        const bottom = height - 30;
        const stepX = values.length > 1 ? (right - left) / (values.length - 1) : 0;

        const points = values.map((value, index) => {
          const x = left + stepX * index;
          const y = bottom - ((value - min) / range) * (bottom - top);
          return { x, y, value };
        });

        const gradient = chartCtx.createLinearGradient(0, top, 0, bottom);
        gradient.addColorStop(0, 'rgba(148,235,255,0.35)');
        gradient.addColorStop(1, 'rgba(148,235,255,0.04)');

        chartCtx.beginPath();
        chartCtx.moveTo(points[0].x, bottom);
        points.forEach((point) => chartCtx.lineTo(point.x, point.y));
        chartCtx.lineTo(points[points.length - 1].x, bottom);
        chartCtx.closePath();
        chartCtx.fillStyle = gradient;
        chartCtx.fill();

        chartCtx.beginPath();
        points.forEach((point, index) => {
          if (index === 0) chartCtx.moveTo(point.x, point.y);
          else chartCtx.lineTo(point.x, point.y);
        });
        chartCtx.strokeStyle = '#94ebff';
        chartCtx.lineWidth = 3;
        chartCtx.stroke();

        points.forEach((point) => {
          chartCtx.beginPath();
          chartCtx.arc(point.x, point.y, 4, 0, Math.PI * 2);
          chartCtx.fillStyle = '#7be8e1';
          chartCtx.fill();
        });
      }

      function setText(id, value) {
        const el = document.getElementById(id);
        if (el) el.textContent = value;
      }

      function updateAccessNote(session) {
        const userInfoText = document.getElementById('userInfoText');
        const adminEntryBtn = document.getElementById('adminEntryBtn');
        if (!session || !session.authenticated || !session.user) {
          userInfoText.textContent = '当前未登录';
          adminEntryBtn.classList.add('hidden');
          return;
        }
        userInfoText.textContent = `当前用户：${session.user.display_name}（${session.user.role}）`;
        if (session.user.role === 'admin') {
          adminEntryBtn.classList.remove('hidden');
        } else {
          adminEntryBtn.classList.add('hidden');
        }
      }

      async function loadSession() {
        try {
          const res = await fetch('/api/platform/session/', { cache: 'no-store', credentials: 'same-origin' });
          if (!res.ok) throw new Error('session failed');
          const data = await res.json();
          updateAccessNote(data);
        } catch (err) {
          updateAccessNote(null);
        }
      }

      function renderTelemetryFeed(items) {
        const container = document.getElementById('telemetryFeed');
        if (!items || items.length === 0) {
          container.innerHTML = '<div class="summary-card" style="padding:14px;">暂无本地采集数据</div>';
          return;
        }
        container.innerHTML = items.map(item => {
          const payload = item.payload || {};
          const kv = Object.entries(payload).map(([key, value]) => `
            <div class="kv-pill">
              <div class="kv-k">${key}</div>
              <div class="kv-v">${typeof value === 'object' ? JSON.stringify(value) : value}</div>
            </div>
          `).join('');
          return `
            <div class="telemetry-row">
              <div class="telemetry-top">
                <div class="telemetry-title">设备 #${item.device} · 网关 #${item.gateway}</div>
                <div class="telemetry-time">${new Date(item.collected_at).toLocaleTimeString('zh-CN', { hour12: false })}</div>
              </div>
              <div class="telemetry-topic">${item.topic || '--'}</div>
              <div class="kv-list">${kv}</div>
            </div>
          `;
        }).join('');
      }

      function renderVideoGrid(slots) {
        const container = document.getElementById('videoGrid');
        if (!slots || slots.length === 0) {
          container.innerHTML = '<div class="summary-card" style="padding:14px;">暂无本地视频点位</div>';
          return;
        }
        container.innerHTML = slots.map(slot => `
          <a class="video-card" href="${slot.player_url || '#'}" target="_blank" rel="noreferrer">
            <div class="video-empty">视频未接入</div>
            <div class="video-meta">
              <div>
                <div class="video-name">${slot.name}</div>
                <div class="video-desc">${slot.channel} · ${slot.status}</div>
              </div>
              <div class="video-tag">${slot.tag || '--'}</div>
            </div>
          </a>
        `).join('');
      }

      function renderVideoSummaryStrip(inventory) {
        const items = [
          ['视频点位', inventory.device_total ?? 0],
          ['级联平台', inventory.platform_total ?? 0],
          ['媒体节点', inventory.media_server_total ?? 0],
          ['在线节点', inventory.media_server_online ?? 0],
        ];
        document.getElementById('videoSummaryStrip').innerHTML = items.map(([label, value]) => `
          <div class="summary-card">
            <div class="summary-label">${label}</div>
            <div class="summary-value">${value}</div>
          </div>
        `).join('');
      }

      async function refreshBigscreen() {
        try {
          const res = await fetch(dashboardUrl, { cache: 'no-store' });
          if (!res.ok) throw new Error('dashboard failed');
          const data = await res.json();
          const stats = data.stats || {};
          const inventory = data.video_inventory || {};
          latestSeries = data.latest_telemetry || [];

          setText('metricDevices', stats.device_count ?? 0);
          setText('metricOnlineDevices', stats.online_device_count ?? 0);
          setText('metricVideoDevices', inventory.device_total ?? 0);
          setText('metricMediaNodes', `${inventory.media_server_online ?? 0}/${inventory.media_server_total ?? 0}`);
          setText('metricTelemetry', stats.telemetry_count ?? 0);
          setText('metricWvpLogin', inventory.login_ready ? 'READY' : 'WAIT');

          renderTelemetryFeed(latestSeries);
          renderVideoGrid(data.video_slots || []);
          renderVideoSummaryStrip(inventory);
          drawSensorChart(latestSeries);
        } catch (err) {
          document.getElementById('telemetryFeed').innerHTML = '<div class="summary-card" style="padding:14px;">本地采集流加载失败</div>';
          document.getElementById('videoGrid').innerHTML = '<div class="summary-card" style="padding:14px;">本地视频矩阵加载失败</div>';
          document.getElementById('videoSummaryStrip').innerHTML = '<div class="summary-card" style="padding:14px;">视频摘要加载失败</div>';
          drawSensorChart([]);
        }
      }

      async function logout() {
        await ensureSessionCookie();
        await fetch('/api/platform/logout/', {
          method: 'POST',
          headers: { 'X-CSRFToken': getCookie('csrftoken') },
          credentials: 'same-origin',
        });
        window.location.href = '/login.html';
      }

      document.getElementById('adminEntryBtn').addEventListener('click', () => {
        window.location.href = '/admin.html';
      });
      document.getElementById('logoutBtn').addEventListener('click', logout);

      syncClock();
      setInterval(syncClock, 1000);
      window.addEventListener('resize', resizeCanvas);
      setTimeout(resizeCanvas, 80);
      loadSession();
      refreshBigscreen();
      setInterval(refreshBigscreen, 5000);
    </script>
  </body>
</html>
