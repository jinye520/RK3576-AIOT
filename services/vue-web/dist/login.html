<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RK3576 智能物联网控制盒 · 登录</title>
    <style>
      :root {
        --deep-1: #02111b;
        --deep-2: #062334;
        --deep-3: #0a3244;
        --panel: rgba(4, 23, 36, 0.78);
        --line: rgba(91, 206, 214, 0.18);
        --line-strong: rgba(124, 235, 255, 0.36);
        --text: #ebfbff;
        --muted: #8db8c4;
        --primary: #58d6d0;
        --accent: #7ce7ff;
        --green: #4fd6a6;
        --amber: #f6c86b;
        --red: #ff7a7a;
        --shadow: 0 34px 120px rgba(0, 0, 0, 0.42);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 84% 12%, rgba(124,231,255,0.18), transparent 18%),
          radial-gradient(circle at 10% 88%, rgba(79,214,166,0.12), transparent 22%),
          linear-gradient(180deg, #010b11 0%, #041826 46%, #07283b 100%);
        overflow: hidden;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 20% 30%, rgba(124,231,255,0.08), transparent 18%),
          radial-gradient(circle at 70% 60%, rgba(88,214,208,0.08), transparent 22%),
          linear-gradient(transparent 0 96%, rgba(124,231,255,0.05) 96% 100%);
        background-size: auto, auto, 100% 44px;
        opacity: 0.9;
      }
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(90deg, transparent 0 96%, rgba(124,231,255,0.035) 96% 100%);
        background-size: 44px 100%;
        mask-image: radial-gradient(circle at center, black 32%, transparent 88%);
      }
      .shell {
        width: min(980px, calc(100vw - 32px));
        display: grid;
        grid-template-columns: 1.08fr 0.92fr;
        gap: 22px;
      }
      .hero,
      .card {
        position: relative;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 30px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
        overflow: hidden;
      }
      .hero {
        padding: 36px;
      }
      .hero::before {
        content: "";
        position: absolute;
        right: -80px;
        bottom: -80px;
        width: 260px;
        height: 260px;
        border-radius: 50%;
        border: 1px solid rgba(124,231,255,0.14);
        box-shadow:
          0 0 0 32px rgba(124,231,255,0.03),
          0 0 0 72px rgba(124,231,255,0.02);
      }
      .hero::after {
        content: "";
        position: absolute;
        inset: auto -12% 8% 34%;
        height: 180px;
        background: radial-gradient(circle, rgba(88,214,208,0.16), transparent 64%);
        pointer-events: none;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(124,231,255,0.22);
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      h1 {
        margin: 18px 0 12px;
        font-size: 42px;
        line-height: 1.08;
      }
      .hero-desc {
        color: var(--muted);
        font-size: 15px;
        line-height: 1.95;
        max-width: 620px;
      }
      .hero-pills {
        margin-top: 22px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .pill {
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid rgba(124,231,255,0.14);
        background: rgba(124,231,255,0.08);
        font-size: 12px;
      }
      .hero-links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 22px;
      }
      .hero-links a {
        text-decoration: none;
        border-radius: 14px;
        padding: 12px 14px;
        font-size: 13px;
        font-weight: 700;
        color: var(--text);
        border: 1px solid rgba(124,231,255,0.16);
        background: rgba(255,255,255,0.035);
      }
      .card {
        padding: 24px;
      }
      .section-kicker {
        color: var(--muted);
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      .tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin: 14px 0 18px;
      }
      .tab-btn {
        appearance: none;
        border: 1px solid rgba(124,231,255,0.14);
        background: rgba(255,255,255,0.03);
        color: var(--text);
        cursor: pointer;
        border-radius: 14px;
        padding: 12px 14px;
        font-size: 13px;
        font-weight: 700;
      }
      .tab-btn.active {
        color: #032435;
        background: linear-gradient(135deg, #58d6d0, #7ce7ff);
      }
      .panel-title { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
      .panel-subtitle { color: var(--muted); font-size: 13px; line-height: 1.8; margin-bottom: 22px; }
      .field { margin-bottom: 14px; }
      .field label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 12px; }
      .field input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid rgba(124,231,255,0.14);
        background: rgba(255,255,255,0.03);
        color: var(--text);
        outline: none;
      }
      .field input:focus { border-color: var(--line-strong); }
      .primary-btn, .ghost-btn {
        width: 100%;
        border-radius: 14px;
        padding: 14px 16px;
        font-size: 14px;
        font-weight: 800;
        cursor: pointer;
      }
      .primary-btn {
        border: 0;
        color: #032435;
        background: linear-gradient(135deg, #58d6d0, #7ce7ff);
      }
      .ghost-btn {
        margin-top: 10px;
        border: 1px solid rgba(124,231,255,0.16);
        color: var(--text);
        background: rgba(255,255,255,0.035);
      }
      .result {
        margin-top: 18px;
        padding: 14px;
        border-radius: 16px;
        border: 1px solid rgba(124,231,255,0.12);
        background: rgba(255,255,255,0.03);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.75;
      }
      .ok { color: var(--green); }
      .warn { color: var(--amber); }
      .bad { color: var(--red); }
      .hidden { display: none; }
      @media (max-width: 960px) {
        .shell { grid-template-columns: 1fr; }
      }
      @media (max-width: 640px) {
        body { padding: 16px; }
        .hero, .card { padding: 18px; }
        h1 { font-size: 32px; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="hero">
        <div class="badge">Smart IoT Control Box</div>
        <h1>RK3576 智能物联网控制盒</h1>
        <div class="hero-desc">
          部署在 RK3576 上的海洋场景边缘控制中心，负责数据采集、协议转换、视频接入、本地录像与云平台推送。登录或注册成功后，将直接进入控制盒指挥大屏；管理员在大屏中额外看到后台入口。
        </div>
        <div class="hero-pills">
          <span class="pill">数据采集</span>
          <span class="pill">协议转换</span>
          <span class="pill">视频接入</span>
          <span class="pill">本地录像</span>
          <span class="pill">云端推送</span>
        </div>
        <div class="hero-links">
          <a href="/bigscreen.html" target="_blank" rel="noreferrer">控制盒指挥大屏</a>
          <a href="/admin.html" target="_blank" rel="noreferrer">控制盒后台</a>
        </div>
      </section>

      <section class="card">
        <div class="section-kicker">Access Portal</div>
        <div class="tabs">
          <button class="tab-btn active" id="tabLoginBtn">用户登录</button>
          <button class="tab-btn" id="tabRegisterBtn">新用户注册</button>
        </div>

        <div id="loginPanel">
          <div class="panel-title">登录</div>
          <div class="panel-subtitle">登录成功后将直接进入智能物联网控制盒指挥大屏。</div>
          <div class="field">
            <label>用户名</label>
            <input id="loginUsername" value="admin" />
          </div>
          <div class="field">
            <label>密码</label>
            <input id="loginPassword" type="password" value="admin123456" />
          </div>
          <button class="primary-btn" id="loginBtn">登录并进入指挥大屏</button>
        </div>

        <div id="registerPanel" class="hidden">
          <div class="panel-title">注册</div>
          <div class="panel-subtitle">新用户注册后默认成为观察员，并自动进入控制盒指挥大屏。</div>
          <div class="field">
            <label>显示名称</label>
            <input id="registerDisplayName" placeholder="请输入显示名称" />
          </div>
          <div class="field">
            <label>用户名</label>
            <input id="registerUsername" placeholder="请输入用户名" />
          </div>
          <div class="field">
            <label>密码</label>
            <input id="registerPassword" type="password" placeholder="至少 6 位" />
          </div>
          <div class="field">
            <label>确认密码</label>
            <input id="registerConfirmPassword" type="password" placeholder="再次输入密码" />
          </div>
          <button class="primary-btn" id="registerBtn">注册并进入指挥大屏</button>
        </div>

        <button class="ghost-btn" id="backBigscreenBtn">直接进入大屏演示</button>
        <div class="result" id="resultBox">默认测试账号：admin / admin123456</div>
      </section>
    </div>

    <script>
      function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return '';
      }

      async function ensureSessionCookie() {
        await fetch('/api/platform/session/', { cache: 'no-store', credentials: 'same-origin' });
      }

      function showTab(type) {
        const loginPanel = document.getElementById('loginPanel');
        const registerPanel = document.getElementById('registerPanel');
        const tabLoginBtn = document.getElementById('tabLoginBtn');
        const tabRegisterBtn = document.getElementById('tabRegisterBtn');
        const isLogin = type === 'login';
        loginPanel.classList.toggle('hidden', !isLogin);
        registerPanel.classList.toggle('hidden', isLogin);
        tabLoginBtn.classList.toggle('active', isLogin);
        tabRegisterBtn.classList.toggle('active', !isLogin);
      }

      function setResult(message, level = 'normal') {
        const box = document.getElementById('resultBox');
        box.className = 'result';
        if (level === 'ok') box.classList.add('ok');
        if (level === 'warn') box.classList.add('warn');
        if (level === 'bad') box.classList.add('bad');
        box.textContent = message;
      }

      async function login() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        setResult('正在连接智能物联网控制盒...');
        try {
          await ensureSessionCookie();
          const res = await fetch('/api/platform/login/', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': getCookie('csrftoken'),
            },
            credentials: 'same-origin',
            body: JSON.stringify({ username, password }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || 'login failed');
          setResult(`登录成功，正在进入控制盒指挥大屏：${data.user.display_name}`, 'ok');
          window.location.href = data.redirect_to || '/bigscreen.html';
        } catch (err) {
          setResult(err.message, 'bad');
        }
      }

      async function registerUser() {
        const payload = {
          display_name: document.getElementById('registerDisplayName').value.trim(),
          username: document.getElementById('registerUsername').value.trim(),
          password: document.getElementById('registerPassword').value,
          confirm_password: document.getElementById('registerConfirmPassword').value,
        };
        setResult('正在创建控制盒访问账户...');
        try {
          await ensureSessionCookie();
          const res = await fetch('/api/platform/register/', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': getCookie('csrftoken'),
            },
            credentials: 'same-origin',
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || 'register failed');
          setResult(`注册成功，正在进入控制盒指挥大屏：${data.user.display_name}`, 'ok');
          window.location.href = data.redirect_to || '/bigscreen.html';
        } catch (err) {
          setResult(err.message, 'bad');
        }
      }

      document.getElementById('tabLoginBtn').addEventListener('click', () => showTab('login'));
      document.getElementById('tabRegisterBtn').addEventListener('click', () => showTab('register'));
      document.getElementById('loginBtn').addEventListener('click', login);
      document.getElementById('registerBtn').addEventListener('click', registerUser);
      document.getElementById('backBigscreenBtn').addEventListener('click', () => {
        window.location.href = '/bigscreen.html';
      });
    </script>
  </body>
</html>
