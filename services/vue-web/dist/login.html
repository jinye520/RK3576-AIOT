<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>平台登录 · RK3576 Edge AIOT</title>
    <style>
      :root {
        --bg: #050816;
        --panel: rgba(8, 14, 28, 0.88);
        --line: rgba(123, 162, 255, 0.16);
        --line-strong: rgba(123, 162, 255, 0.28);
        --text: #edf4ff;
        --muted: #8ea2c6;
        --primary: #73b9ff;
        --cyan: #6ae9ff;
        --green: #34d399;
        --amber: #f6c363;
        --red: #f87171;
        --shadow: 0 28px 90px rgba(0, 0, 0, 0.46);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top right, rgba(115,185,255,0.18), transparent 20%),
          radial-gradient(circle at bottom left, rgba(70,223,200,0.14), transparent 26%),
          linear-gradient(180deg, #02040b 0%, #07101d 46%, #091221 100%);
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(115,185,255,0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(115,185,255,0.035) 1px, transparent 1px);
        background-size: 44px 44px;
        mask-image: radial-gradient(circle at center, black 30%, transparent 88%);
      }
      .shell {
        width: min(960px, calc(100vw - 32px));
        display: grid;
        grid-template-columns: 1.05fr 0.95fr;
        gap: 20px;
      }
      .hero,
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }
      .hero {
        padding: 34px;
        position: relative;
        overflow: hidden;
      }
      .hero::after {
        content: "";
        position: absolute;
        inset: auto -18% -28% 36%;
        height: 220px;
        background: radial-gradient(circle, rgba(115,185,255,0.22), transparent 62%);
        pointer-events: none;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(106,233,255,0.2);
        color: var(--cyan);
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      h1 {
        margin: 18px 0 12px;
        font-size: 42px;
        line-height: 1.08;
      }
      .hero-desc {
        color: var(--muted);
        font-size: 15px;
        line-height: 1.9;
        max-width: 620px;
      }
      .hero-pills {
        margin-top: 22px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .pill {
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid rgba(115,185,255,0.14);
        background: rgba(115,185,255,0.08);
        font-size: 12px;
      }
      .hero-links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 20px;
      }
      .hero-links a {
        text-decoration: none;
        border-radius: 14px;
        padding: 12px 14px;
        font-size: 13px;
        font-weight: 700;
        color: var(--text);
        border: 1px solid rgba(123,162,255,0.16);
        background: rgba(255,255,255,0.035);
      }
      .card { padding: 24px; }
      .tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 18px;
      }
      .tab-btn {
        appearance: none;
        border: 1px solid rgba(123,162,255,0.16);
        background: rgba(255,255,255,0.03);
        color: var(--text);
        cursor: pointer;
        border-radius: 14px;
        padding: 12px 14px;
        font-size: 13px;
        font-weight: 700;
      }
      .tab-btn.active {
        color: #05192a;
        background: linear-gradient(135deg, #73b9ff, #6ae9ff);
        border-color: transparent;
      }
      .panel-title { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
      .panel-subtitle { color: var(--muted); font-size: 13px; line-height: 1.8; margin-bottom: 22px; }
      .field { margin-bottom: 14px; }
      .field label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 12px; }
      .field input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid rgba(123,162,255,0.14);
        background: rgba(255,255,255,0.03);
        color: var(--text);
        outline: none;
      }
      .field input:focus { border-color: var(--line-strong); }
      .primary-btn, .ghost-btn {
        width: 100%;
        border-radius: 14px;
        padding: 14px 16px;
        font-size: 14px;
        font-weight: 800;
        cursor: pointer;
      }
      .primary-btn {
        border: 0;
        color: #05192a;
        background: linear-gradient(135deg, #73b9ff, #6ae9ff);
      }
      .ghost-btn {
        margin-top: 10px;
        border: 1px solid rgba(123,162,255,0.16);
        color: var(--text);
        background: rgba(255,255,255,0.035);
      }
      .result {
        margin-top: 18px;
        padding: 14px;
        border-radius: 16px;
        border: 1px solid rgba(123,162,255,0.12);
        background: rgba(255,255,255,0.03);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.75;
      }
      .ok { color: var(--green); }
      .warn { color: var(--amber); }
      .bad { color: var(--red); }
      .hidden { display: none; }
      @media (max-width: 960px) {
        .shell { grid-template-columns: 1fr; }
      }
      @media (max-width: 640px) {
        body { padding: 16px; }
        .hero, .card { padding: 18px; }
        h1 { font-size: 32px; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="hero">
        <div class="badge">Command Screen Entry</div>
        <h1>登录平台后<br />直接进入指挥大屏</h1>
        <div class="hero-desc">
          平台使用“登录 → 指挥大屏 → 管理员后台”的结构。普通用户登录后仅进入指挥大屏；管理员登录后，在大屏中额外看到后台管理入口。
        </div>
        <div class="hero-pills">
          <span class="pill">指挥大屏</span>
          <span class="pill">用户登录</span>
          <span class="pill">新用户注册</span>
          <span class="pill">管理员后台</span>
        </div>
        <div class="hero-links">
          <a href="/bigscreen.html" target="_blank" rel="noreferrer">查看指挥大屏</a>
          <a href="http://localhost:28080/#/login" target="_blank" rel="noreferrer">WVP 登录</a>
        </div>
      </section>

      <section class="card">
        <div class="tabs">
          <button class="tab-btn active" id="tabLoginBtn">用户登录</button>
          <button class="tab-btn" id="tabRegisterBtn">新用户注册</button>
        </div>

        <div id="loginPanel">
          <div class="panel-title">登录</div>
          <div class="panel-subtitle">登录成功后将直接跳转到指挥大屏。</div>
          <div class="field">
            <label>用户名</label>
            <input id="loginUsername" value="admin" />
          </div>
          <div class="field">
            <label>密码</label>
            <input id="loginPassword" type="password" value="admin123456" />
          </div>
          <button class="primary-btn" id="loginBtn">登录并进入指挥大屏</button>
        </div>

        <div id="registerPanel" class="hidden">
          <div class="panel-title">注册</div>
          <div class="panel-subtitle">新用户注册后默认成为观察员，并自动进入指挥大屏。</div>
          <div class="field">
            <label>显示名称</label>
            <input id="registerDisplayName" placeholder="请输入显示名称" />
          </div>
          <div class="field">
            <label>用户名</label>
            <input id="registerUsername" placeholder="请输入用户名" />
          </div>
          <div class="field">
            <label>密码</label>
            <input id="registerPassword" type="password" placeholder="至少 6 位" />
          </div>
          <div class="field">
            <label>确认密码</label>
            <input id="registerConfirmPassword" type="password" placeholder="再次输入密码" />
          </div>
          <button class="primary-btn" id="registerBtn">注册并进入指挥大屏</button>
        </div>

        <button class="ghost-btn" id="backBigscreenBtn">直接进入指挥大屏演示</button>

        <div class="result" id="resultBox">默认测试账号：admin / admin123456</div>
      </section>
    </div>

    <script>
      function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return '';
      }

      async function ensureSessionCookie() {
        await fetch('/api/platform/session/', { cache: 'no-store', credentials: 'same-origin' });
      }

      function showTab(type) {
        const loginPanel = document.getElementById('loginPanel');
        const registerPanel = document.getElementById('registerPanel');
        const tabLoginBtn = document.getElementById('tabLoginBtn');
        const tabRegisterBtn = document.getElementById('tabRegisterBtn');
        const isLogin = type === 'login';
        loginPanel.classList.toggle('hidden', !isLogin);
        registerPanel.classList.toggle('hidden', isLogin);
        tabLoginBtn.classList.toggle('active', isLogin);
        tabRegisterBtn.classList.toggle('active', !isLogin);
      }

      function setResult(message, level = 'normal') {
        const box = document.getElementById('resultBox');
        box.className = 'result';
        if (level === 'ok') box.classList.add('ok');
        if (level === 'warn') box.classList.add('warn');
        if (level === 'bad') box.classList.add('bad');
        box.textContent = message;
      }

      async function login() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        setResult('登录中...');
        try {
          await ensureSessionCookie();
          const res = await fetch('/api/platform/login/', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': getCookie('csrftoken'),
            },
            credentials: 'same-origin',
            body: JSON.stringify({ username, password }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || 'login failed');
          setResult(`登录成功，正在进入指挥大屏：${data.user.display_name}`, 'ok');
          window.location.href = data.redirect_to || '/bigscreen.html';
        } catch (err) {
          setResult(err.message, 'bad');
        }
      }

      async function registerUser() {
        const payload = {
          display_name: document.getElementById('registerDisplayName').value.trim(),
          username: document.getElementById('registerUsername').value.trim(),
          password: document.getElementById('registerPassword').value,
          confirm_password: document.getElementById('registerConfirmPassword').value,
        };
        setResult('注册中...');
        try {
          await ensureSessionCookie();
          const res = await fetch('/api/platform/register/', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': getCookie('csrftoken'),
            },
            credentials: 'same-origin',
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || 'register failed');
          setResult(`注册成功，正在进入指挥大屏：${data.user.display_name}`, 'ok');
          window.location.href = data.redirect_to || '/bigscreen.html';
        } catch (err) {
          setResult(err.message, 'bad');
        }
      }

      document.getElementById('tabLoginBtn').addEventListener('click', () => showTab('login'));
      document.getElementById('tabRegisterBtn').addEventListener('click', () => showTab('register'));
      document.getElementById('loginBtn').addEventListener('click', login);
      document.getElementById('registerBtn').addEventListener('click', registerUser);
      document.getElementById('backBigscreenBtn').addEventListener('click', () => {
        window.location.href = '/bigscreen.html';
      });
    </script>
  </body>
</html>
