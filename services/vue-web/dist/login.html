<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RK3576 智能物联网控制盒 · 登录</title>
    <style>
      :root {
        --text: #f6fdff;
        --muted: rgba(225, 241, 246, 0.86);
        --line: rgba(153, 229, 255, 0.22);
        --line-strong: rgba(153, 229, 255, 0.48);
        --primary: #7be8e1;
        --accent: #94ebff;
        --green: #4fd6a6;
        --amber: #f6c86b;
        --red: #ff7a7a;
        --shadow: 0 28px 80px rgba(7, 25, 38, 0.22);
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          linear-gradient(rgba(14, 39, 58, 0.42), rgba(10, 30, 46, 0.5)),
          url('/assets/login-ref/loginbg.png') center/cover no-repeat fixed;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
        overflow: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(transparent 0 96%, rgba(148, 235, 255, 0.05) 96% 100%),
          linear-gradient(90deg, transparent 0 96%, rgba(148, 235, 255, 0.03) 96% 100%);
        background-size: 100% 40px, 40px 100%;
        opacity: 0.42;
      }

      .shell {
        width: min(1120px, calc(100vw - 56px));
        min-height: min(740px, calc(100vh - 56px));
        display: grid;
        grid-template-columns: 1.22fr 0.78fr;
        border-radius: 30px;
        overflow: hidden;
        background: rgba(11, 38, 57, 0.38);
        border: 1px solid rgba(153, 229, 255, 0.16);
        backdrop-filter: blur(10px);
        box-shadow: var(--shadow);
      }

      .brand-panel {
        position: relative;
        padding: 46px 42px 34px;
        background: linear-gradient(180deg, rgba(16, 54, 77, 0.2), rgba(15, 48, 70, 0.08));
        border-right: 1px solid rgba(153, 229, 255, 0.12);
      }

      .brand-badge {
        display: inline-flex;
        align-items: center;
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid rgba(153, 229, 255, 0.18);
        color: #d9f7ff;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        background: rgba(255,255,255,0.04);
      }

      .brand-title {
        margin: 28px 0 10px;
        max-width: 420px;
        font-size: 56px;
        line-height: 1.08;
        font-weight: 800;
        letter-spacing: 0.01em;
        word-break: keep-all;
      }

      .brand-en {
        margin-top: 0;
        color: rgba(179, 232, 246, 0.82);
        font-size: 12px;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      .auth-panel {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 36px 34px;
        background: linear-gradient(180deg, rgba(12, 39, 57, 0.62), rgba(10, 32, 48, 0.72));
      }

      .auth-card {
        width: min(100%, 392px);
      }

      .portal-kicker {
        color: rgba(215, 238, 245, 0.7);
        font-size: 11px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        margin-bottom: 18px;
      }

      .tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 28px;
      }

      .tab-btn {
        appearance: none;
        border: 1px solid rgba(153, 229, 255, 0.18);
        background: rgba(255,255,255,0.08);
        color: var(--text);
        cursor: pointer;
        border-radius: 20px;
        padding: 14px 16px;
        font-size: 14px;
        font-weight: 700;
      }

      .tab-btn.active {
        color: #062336;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        box-shadow: 0 12px 34px rgba(105, 224, 220, 0.22);
      }

      .panel-title {
        margin: 0 0 10px;
        font-size: 40px;
        line-height: 1.08;
        font-weight: 800;
      }

      .panel-subtitle {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.9;
        margin-bottom: 26px;
      }

      .field { margin-bottom: 18px; }

      .field label {
        display: block;
        color: rgba(213, 236, 244, 0.72);
        font-size: 12px;
        margin-bottom: 10px;
      }

      .field input {
        width: 100%;
        border: 1px solid rgba(153, 229, 255, 0.18);
        border-radius: 20px;
        padding: 17px 18px;
        background: rgba(255,255,255,0.09);
        color: var(--text);
        outline: none;
        font-size: 15px;
      }

      .field input:focus {
        border-color: var(--line-strong);
        box-shadow: 0 0 0 3px rgba(126, 226, 251, 0.08);
      }

      .primary-btn {
        width: 100%;
        border: 0;
        border-radius: 20px;
        padding: 18px 18px;
        font-size: 15px;
        font-weight: 800;
        color: #062336;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        cursor: pointer;
        box-shadow: 0 12px 34px rgba(105, 224, 220, 0.18);
      }

      .result {
        margin-top: 18px;
        border-radius: 20px;
        border: 1px solid rgba(153, 229, 255, 0.14);
        background: rgba(255,255,255,0.08);
        padding: 16px 18px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.75;
      }

      .ok { color: var(--green); }
      .warn { color: var(--amber); }
      .bad { color: var(--red); }
      .hidden { display: none; }

      @media (max-width: 980px) {
        .shell {
          grid-template-columns: 1fr;
          min-height: auto;
        }
        .brand-panel {
          min-height: 430px;
        }
        .brand-footer {
          position: relative;
          left: auto;
          right: auto;
          bottom: auto;
          margin-top: 32px;
        }
      }

      @media (max-width: 640px) {
        body { padding: 16px; }
        .brand-panel, .auth-panel { padding: 24px 22px; }
        .brand-title { font-size: 40px; }
        .panel-title { font-size: 36px; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="brand-panel">
        <div class="brand-badge">Smart IoT Control Box</div>
        <h1 class="brand-title">智能海洋物联网控制盒</h1>
        <div class="brand-en">SMART MARINE IOT CONTROL BOX</div>
      </section>

      <section class="auth-panel">
        <div class="auth-card">
          <div class="portal-kicker">Access Portal</div>
          <div class="tabs">
            <button class="tab-btn active" id="tabLoginBtn" type="button">用户登录</button>
            <button class="tab-btn" id="tabRegisterBtn" type="button">新用户注册</button>
          </div>

          <form id="loginPanel">
            <div class="panel-title">登录</div>
            <div class="panel-subtitle">登录成功后将直接进入智能物联网控制盒指挥大屏。</div>
            <div class="field">
              <label for="loginUsername">用户名</label>
              <input id="loginUsername" name="username" autocomplete="username" value="admin" />
            </div>
            <div class="field">
              <label for="loginPassword">密码</label>
              <input id="loginPassword" name="password" autocomplete="current-password" type="password" value="admin123456" />
            </div>
            <button class="primary-btn" id="loginBtn" type="submit">登录</button>
          </form>

          <form id="registerPanel" class="hidden">
            <div class="panel-title">注册</div>
            <div class="panel-subtitle">新用户注册后默认成为观察员，并自动进入控制盒指挥大屏。</div>
            <div class="field">
              <label for="registerDisplayName">显示名称</label>
              <input id="registerDisplayName" name="display_name" autocomplete="name" placeholder="请输入显示名称" />
            </div>
            <div class="field">
              <label for="registerUsername">用户名</label>
              <input id="registerUsername" name="username" autocomplete="username" placeholder="请输入用户名" />
            </div>
            <div class="field">
              <label for="registerPassword">密码</label>
              <input id="registerPassword" name="password" autocomplete="new-password" type="password" placeholder="至少 6 位" />
            </div>
            <div class="field">
              <label for="registerConfirmPassword">确认密码</label>
              <input id="registerConfirmPassword" name="confirm_password" autocomplete="new-password" type="password" placeholder="再次输入密码" />
            </div>
            <button class="primary-btn" id="registerBtn" type="submit">注册</button>
          </form>

          <div class="result" id="resultBox">默认测试账号：admin / admin123456</div>
        </div>
      </section>
    </div>

    <script>
      function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return '';
      }

      async function ensureSessionCookie() {
        await fetch('/api/platform/session/', { cache: 'no-store', credentials: 'same-origin' });
      }

      function showTab(type) {
        const loginPanel = document.getElementById('loginPanel');
        const registerPanel = document.getElementById('registerPanel');
        const tabLoginBtn = document.getElementById('tabLoginBtn');
        const tabRegisterBtn = document.getElementById('tabRegisterBtn');
        const isLogin = type === 'login';
        loginPanel.classList.toggle('hidden', !isLogin);
        registerPanel.classList.toggle('hidden', isLogin);
        tabLoginBtn.classList.toggle('active', isLogin);
        tabRegisterBtn.classList.toggle('active', !isLogin);
      }

      function setResult(message, level = 'normal') {
        const box = document.getElementById('resultBox');
        box.className = 'result';
        if (level === 'ok') box.classList.add('ok');
        if (level === 'warn') box.classList.add('warn');
        if (level === 'bad') box.classList.add('bad');
        box.textContent = message;
      }

      async function login() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        setResult('正在连接智能物联网控制盒...');
        try {
          await ensureSessionCookie();
          const res = await fetch('/api/platform/login/', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': getCookie('csrftoken'),
            },
            credentials: 'same-origin',
            body: JSON.stringify({ username, password }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || 'login failed');
          setResult(`登录成功，正在进入控制盒指挥大屏：${data.user.display_name}`, 'ok');
          window.location.href = data.redirect_to || '/bigscreen.html';
        } catch (err) {
          setResult(err.message, 'bad');
        }
      }

      async function registerUser() {
        const payload = {
          display_name: document.getElementById('registerDisplayName').value.trim(),
          username: document.getElementById('registerUsername').value.trim(),
          password: document.getElementById('registerPassword').value,
          confirm_password: document.getElementById('registerConfirmPassword').value,
        };
        setResult('正在创建控制盒访问账户...');
        try {
          await ensureSessionCookie();
          const res = await fetch('/api/platform/register/', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': getCookie('csrftoken'),
            },
            credentials: 'same-origin',
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || 'register failed');
          setResult(`注册成功，正在进入控制盒指挥大屏：${data.user.display_name}`, 'ok');
          window.location.href = data.redirect_to || '/bigscreen.html';
        } catch (err) {
          setResult(err.message, 'bad');
        }
      }

      document.getElementById('tabLoginBtn').addEventListener('click', () => showTab('login'));
      document.getElementById('tabRegisterBtn').addEventListener('click', () => showTab('register'));
      document.getElementById('loginPanel').addEventListener('submit', (event) => {
        event.preventDefault();
        login();
      });
      document.getElementById('registerPanel').addEventListener('submit', (event) => {
        event.preventDefault();
        registerUser();
      });
    </script>
  </body>
</html>
