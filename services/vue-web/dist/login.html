<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RK3576 智能物联网控制盒 · 登录</title>
    <style>
      :root {
        --deep-0: #010910;
        --deep-1: #031421;
        --deep-2: #07283b;
        --deep-3: #0d3a52;
        --panel: rgba(5, 22, 34, 0.72);
        --panel-strong: rgba(8, 28, 42, 0.92);
        --line: rgba(92, 208, 216, 0.14);
        --line-strong: rgba(124, 235, 255, 0.32);
        --text: #ecfbff;
        --muted: #89afbb;
        --primary: #58d6d0;
        --accent: #7ce7ff;
        --green: #4fd6a6;
        --amber: #f6c86b;
        --red: #ff7a7a;
        --shadow: 0 38px 120px rgba(0, 0, 0, 0.48);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 82% 14%, rgba(124,231,255,0.14), transparent 16%),
          radial-gradient(circle at 14% 86%, rgba(79,214,166,0.08), transparent 18%),
          linear-gradient(180deg, #01070d 0%, #041522 42%, #07283b 100%);
        overflow: hidden;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 16% 28%, rgba(124,231,255,0.07), transparent 18%),
          radial-gradient(circle at 72% 58%, rgba(88,214,208,0.07), transparent 22%),
          linear-gradient(transparent 0 97%, rgba(124,231,255,0.04) 97% 100%);
        background-size: auto, auto, 100% 40px;
      }
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image: linear-gradient(90deg, transparent 0 97%, rgba(124,231,255,0.026) 97% 100%);
        background-size: 40px 100%;
        mask-image: radial-gradient(circle at center, black 34%, transparent 88%);
      }
      .shell {
        position: relative;
        width: min(1140px, calc(100vw - 32px));
        min-height: min(760px, calc(100vh - 48px));
        display: grid;
        grid-template-columns: 1.14fr 0.86fr;
        border-radius: 34px;
        overflow: hidden;
        background: rgba(2, 11, 18, 0.46);
        border: 1px solid rgba(124,231,255,0.1);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }
      .visual {
        position: relative;
        padding: 42px 40px;
        background:
          radial-gradient(circle at top left, rgba(124,231,255,0.12), transparent 22%),
          linear-gradient(180deg, rgba(4,18,30,0.78), rgba(5,25,39,0.46));
        border-right: 1px solid rgba(124,231,255,0.08);
        overflow: hidden;
      }
      .visual::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 78% 18%, rgba(88,214,208,0.14), transparent 18%),
          radial-gradient(circle at 28% 76%, rgba(124,231,255,0.07), transparent 24%);
        pointer-events: none;
      }
      .visual::after {
        content: "";
        position: absolute;
        right: -140px;
        bottom: -140px;
        width: 460px;
        height: 460px;
        border-radius: 50%;
        border: 1px solid rgba(124,231,255,0.1);
        box-shadow:
          0 0 0 38px rgba(124,231,255,0.025),
          0 0 0 90px rgba(124,231,255,0.018),
          0 0 0 150px rgba(124,231,255,0.008);
        pointer-events: none;
      }
      .badge {
        position: relative;
        z-index: 1;
        display: inline-flex;
        align-items: center;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(124,231,255,0.2);
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      .visual h1 {
        position: relative;
        z-index: 1;
        margin: 22px 0 14px;
        font-size: 48px;
        line-height: 1.04;
        letter-spacing: 0.01em;
      }
      .visual-desc {
        position: relative;
        z-index: 1;
        max-width: 540px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.92;
      }
      .visual-pills {
        position: relative;
        z-index: 1;
        margin-top: 24px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .pill {
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid rgba(124,231,255,0.12);
        background: rgba(124,231,255,0.06);
        font-size: 12px;
      }
      .visual-footer {
        position: absolute;
        left: 40px;
        right: 40px;
        bottom: 34px;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        z-index: 1;
      }
      .mini-card {
        padding: 16px;
        border-radius: 20px;
        background: rgba(255,255,255,0.025);
        border: 1px solid rgba(124,231,255,0.08);
      }
      .mini-label {
        color: var(--muted);
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .mini-value {
        margin-top: 10px;
        font-size: 18px;
        font-weight: 800;
      }
      .auth {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 36px;
        background: linear-gradient(180deg, rgba(6,23,36,0.96), rgba(4,18,28,0.94));
      }
      .auth-card {
        width: min(100%, 390px);
      }
      .section-kicker {
        color: var(--muted);
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      .tabs {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin: 16px 0 22px;
      }
      .tab-btn {
        appearance: none;
        border: 1px solid rgba(124,231,255,0.12);
        background: rgba(255,255,255,0.02);
        color: var(--text);
        cursor: pointer;
        border-radius: 16px;
        padding: 12px 14px;
        font-size: 13px;
        font-weight: 700;
      }
      .tab-btn.active {
        color: #032435;
        background: linear-gradient(135deg, #58d6d0, #7ce7ff);
      }
      .panel-title {
        font-size: 30px;
        font-weight: 800;
        margin-bottom: 10px;
      }
      .panel-subtitle {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.85;
        margin-bottom: 22px;
      }
      .field { margin-bottom: 14px; }
      .field label {
        display: block;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 12px;
      }
      .field input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid rgba(124,231,255,0.12);
        background: rgba(255,255,255,0.025);
        color: var(--text);
        outline: none;
      }
      .field input:focus { border-color: var(--line-strong); }
      .primary-btn {
        width: 100%;
        border: 0;
        border-radius: 16px;
        padding: 15px 16px;
        font-size: 14px;
        font-weight: 800;
        color: #032435;
        background: linear-gradient(135deg, #58d6d0, #7ce7ff);
        cursor: pointer;
        margin-top: 6px;
      }
      .result {
        margin-top: 18px;
        padding: 14px;
        border-radius: 16px;
        border: 1px solid rgba(124,231,255,0.1);
        background: rgba(255,255,255,0.025);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.75;
      }
      .ok { color: var(--green); }
      .warn { color: var(--amber); }
      .bad { color: var(--red); }
      .hidden { display: none; }
      @media (max-width: 980px) {
        .shell {
          grid-template-columns: 1fr;
          min-height: auto;
        }
        .visual {
          min-height: 420px;
        }
        .visual-footer {
          position: relative;
          left: auto;
          right: auto;
          bottom: auto;
          margin-top: 28px;
        }
      }
      @media (max-width: 640px) {
        body { padding: 16px; }
        .visual, .auth { padding: 20px; }
        .visual h1 { font-size: 36px; }
        .visual-footer { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="visual">
        <div class="badge">Smart IoT Control Box</div>
        <h1>RK3576 智能物联网控制盒</h1>
        <div class="visual-desc">
          部署在 RK3576 上的海洋场景边缘控制中心，负责现场数据采集、协议转换、视频接入、本地录像存储及云平台推送，形成一体化边缘控制闭环。
        </div>
        <div class="visual-pills">
          <span class="pill">数据采集</span>
          <span class="pill">协议转换</span>
          <span class="pill">视频接入</span>
          <span class="pill">本地录像</span>
          <span class="pill">云端推送</span>
        </div>
        <div class="visual-footer">
          <div class="mini-card">
            <div class="mini-label">部署位置</div>
            <div class="mini-value">RK3576 边缘侧</div>
          </div>
          <div class="mini-card">
            <div class="mini-label">主界面</div>
            <div class="mini-value">控制盒指挥大屏</div>
          </div>
          <div class="mini-card">
            <div class="mini-label">运维入口</div>
            <div class="mini-value">管理员后台</div>
          </div>
        </div>
      </section>

      <section class="auth">
        <div class="auth-card">
          <div class="section-kicker">Access Portal</div>
          <div class="tabs">
            <button class="tab-btn active" id="tabLoginBtn">用户登录</button>
            <button class="tab-btn" id="tabRegisterBtn">新用户注册</button>
          </div>

          <div id="loginPanel">
            <div class="panel-title">登录</div>
            <div class="panel-subtitle">登录成功后将直接进入智能物联网控制盒指挥大屏。</div>
            <div class="field">
              <label>用户名</label>
              <input id="loginUsername" value="admin" />
            </div>
            <div class="field">
              <label>密码</label>
              <input id="loginPassword" type="password" value="admin123456" />
            </div>
            <button class="primary-btn" id="loginBtn">登录</button>
          </div>

          <div id="registerPanel" class="hidden">
            <div class="panel-title">注册</div>
            <div class="panel-subtitle">新用户注册后默认成为观察员，并自动进入控制盒指挥大屏。</div>
            <div class="field">
              <label>显示名称</label>
              <input id="registerDisplayName" placeholder="请输入显示名称" />
            </div>
            <div class="field">
              <label>用户名</label>
              <input id="registerUsername" placeholder="请输入用户名" />
            </div>
            <div class="field">
              <label>密码</label>
              <input id="registerPassword" type="password" placeholder="至少 6 位" />
            </div>
            <div class="field">
              <label>确认密码</label>
              <input id="registerConfirmPassword" type="password" placeholder="再次输入密码" />
            </div>
            <button class="primary-btn" id="registerBtn">注册</button>
          </div>

          <div class="result" id="resultBox">默认测试账号：admin / admin123456</div>
        </div>
      </section>
    </div>

    <script>
      function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return '';
      }

      async function ensureSessionCookie() {
        await fetch('/api/platform/session/', { cache: 'no-store', credentials: 'same-origin' });
      }

      function showTab(type) {
        const loginPanel = document.getElementById('loginPanel');
        const registerPanel = document.getElementById('registerPanel');
        const tabLoginBtn = document.getElementById('tabLoginBtn');
        const tabRegisterBtn = document.getElementById('tabRegisterBtn');
        const isLogin = type === 'login';
        loginPanel.classList.toggle('hidden', !isLogin);
        registerPanel.classList.toggle('hidden', isLogin);
        tabLoginBtn.classList.toggle('active', isLogin);
        tabRegisterBtn.classList.toggle('active', !isLogin);
      }

      function setResult(message, level = 'normal') {
        const box = document.getElementById('resultBox');
        box.className = 'result';
        if (level === 'ok') box.classList.add('ok');
        if (level === 'warn') box.classList.add('warn');
        if (level === 'bad') box.classList.add('bad');
        box.textContent = message;
      }

      async function login() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;
        setResult('正在连接智能物联网控制盒...');
        try {
          await ensureSessionCookie();
          const res = await fetch('/api/platform/login/', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': getCookie('csrftoken'),
            },
            credentials: 'same-origin',
            body: JSON.stringify({ username, password }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || 'login failed');
          setResult(`登录成功，正在进入控制盒指挥大屏：${data.user.display_name}`, 'ok');
          window.location.href = data.redirect_to || '/bigscreen.html';
        } catch (err) {
          setResult(err.message, 'bad');
        }
      }

      async function registerUser() {
        const payload = {
          display_name: document.getElementById('registerDisplayName').value.trim(),
          username: document.getElementById('registerUsername').value.trim(),
          password: document.getElementById('registerPassword').value,
          confirm_password: document.getElementById('registerConfirmPassword').value,
        };
        setResult('正在创建控制盒访问账户...');
        try {
          await ensureSessionCookie();
          const res = await fetch('/api/platform/register/', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': getCookie('csrftoken'),
            },
            credentials: 'same-origin',
            body: JSON.stringify(payload),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || 'register failed');
          setResult(`注册成功，正在进入控制盒指挥大屏：${data.user.display_name}`, 'ok');
          window.location.href = data.redirect_to || '/bigscreen.html';
        } catch (err) {
          setResult(err.message, 'bad');
        }
      }

      document.getElementById('tabLoginBtn').addEventListener('click', () => showTab('login'));
      document.getElementById('tabRegisterBtn').addEventListener('click', () => showTab('register'));
      document.getElementById('loginBtn').addEventListener('click', login);
      document.getElementById('registerBtn').addEventListener('click', registerUser);
    </script>
  </body>
</html>
