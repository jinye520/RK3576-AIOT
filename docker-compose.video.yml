services:
  zlm:
    image: zlmediakit/zlmediakit:master
    container_name: edge-zlm
    environment:
      TZ: ${TZ}
    ports:
      - "19350:1935"
      - "15540:554"
      - "28082:80"
      - "28443:443"
      - "11000:10000"
      - "11000:10000/udp"
      - "11001-11010:10001-10010/udp"
    volumes:
      - ./data/zlm/www:/opt/media/www
      - ./data/record:/opt/media/record
      - ./docker/zlm/config.ini:/opt/media/conf/config.ini:ro
    restart: unless-stopped
    networks:
      - edge-net

  wvp-builder:
    image: maven:3.9-eclipse-temurin-11
    container_name: edge-wvp-builder
    command: ["sh", "-c", "if [ -f /output/wvp-pro.jar ]; then echo '[wvp-builder] jar already exists'; else mvn -q -DskipTests package && cp target/wvp-pro-*.jar /output/wvp-pro.jar; fi && tail -f /dev/null"]
    volumes:
      - ./data/wvp-source:/src
      - ./data/wvp:/output
    working_dir: /src
    restart: unless-stopped
    networks:
      - edge-net

  wvp:
    image: eclipse-temurin:17-jdk-jammy
    container_name: edge-wvp
    depends_on:
      - mysql
      - redis
      - zlm
      - wvp-builder
    command: ["sh", "/opt/wvp/start-wvp.sh"]
    environment:
      TZ: ${TZ}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: root
      DATABASE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      ZLM_HOST: zlm
      ZLM_HOOK_HOST: edge-wvp
      ZLM_SERCERT: ${ZLM_SERCERT:-0}
      MediaHttp: 28082
      MediaHttps: 28443
      MediaRtmp: 19350
      MediaRtsp: 15540
      MediaRtp: 10003
      SIP_ShowIP: 127.0.0.1
      SIP_Port: 8116
      SIP_Domain: 3402000000
      SIP_Id: 34020000002000000001
      SIP_Password: 12345678
      Stream_IP: 127.0.0.1
      SDP_IP: 127.0.0.1
      RecordSip: false
      RecordPushLive: false
    ports:
      - "28080:18978"
      - "28116:8116"
      - "28116:8116/udp"
      - "13000-13100:30000-30100/udp"
    volumes:
      - ./data/wvp:/opt/wvp
      - ./docker/wvp/application-docker.yml:/opt/wvp/application-docker.yml:ro
      - ./docker/wvp/README.md:/opt/wvp/README.md:ro
      - ./docker/wvp/start-wvp.sh:/opt/wvp/start-wvp.sh:ro
      - ./data/record:/opt/media/bin/www/record
    restart: unless-stopped
    networks:
      - edge-net

networks:
  edge-net:
    external: true
    name: rk3576-aiot_edge-net
