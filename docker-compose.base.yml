services:
  nginx:
    image: nginx:1.27-alpine
    container_name: edge-nginx
    depends_on:
      - vue-web
      - django-api
      - node-red
    ports:
      - "8088:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./data/django-media:/app/media:ro
    restart: unless-stopped
    networks:
      - edge-net

  vue-web:
    build:
      context: ./services/vue-web
      dockerfile: Dockerfile
    container_name: edge-vue
    restart: unless-stopped
    networks:
      - edge-net

  django-api:
    build:
      context: ./services/django-api
      dockerfile: Dockerfile
    container_name: edge-django
    depends_on:
      - mysql
      - redis
      - mqtt
    environment:
      TZ: ${TZ}
      DJANGO_ENV: ${DJANGO_ENV}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MQTT_HOST: mqtt
      MQTT_PORT: 1883
    volumes:
      - ./services/django-api/app:/app
      - ./docker:/app/docker:ro
      - ./data:/app/project-data:ro
      - ./data/django-media:/app/media
    ports:
      - "8008:8000"
    restart: unless-stopped
    networks:
      - edge-net

  mysql:
    image: mysql:8.0
    container_name: edge-mysql
    command:
      [
        "mysqld",
        "--character-set-server=utf8mb4",
        "--collation-server=utf8mb4_unicode_ci",
        "--default-authentication-plugin=mysql_native_password"
      ]
    environment:
      TZ: ${TZ}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "13316:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    restart: unless-stopped
    networks:
      - edge-net

  redis:
    image: redis:7-alpine
    container_name: edge-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "16380:6379"
    volumes:
      - ./data/redis:/data
    restart: unless-stopped
    networks:
      - edge-net

  mqtt:
    image: eclipse-mosquitto:2
    container_name: edge-mqtt
    ports:
      - "11883:1883"
      - "19001:9001"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./data/mosquitto:/mosquitto/data
      - ./data/mosquitto-log:/mosquitto/log
    restart: unless-stopped
    networks:
      - edge-net

  node-red:
    image: nodered/node-red:latest
    container_name: edge-node-red
    depends_on:
      - mqtt
    environment:
      TZ: ${TZ}
    ports:
      - "1888:1880"
    volumes:
      - ./data/nodered:/data
    restart: unless-stopped
    networks:
      - edge-net

networks:
  edge-net:
    driver: bridge
